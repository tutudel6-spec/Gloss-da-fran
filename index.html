
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sephora | Coleção Fran</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; padding-bottom: 100px; }
        .top-banner { background: #000; color: #fff; text-align: center; padding: 8px; font-size: 10px; text-transform: uppercase; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff; z-index: 1000; }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 5px; margin: auto; }
        .cart-icon { position: relative; cursor: pointer; font-size: 22px; }
        #cart-count { position: absolute; top: -5px; right: -10px; background: #d63384; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
        
        .nav-categories { display: flex; justify-content: center; padding: 15px; border-bottom: 1px solid #eee; gap: 25px; background: #fff; }
        .nav-categories div { color: #888; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; padding-bottom: 5px; border-bottom: 2px solid transparent; }
        .nav-categories div.active { color: #000; border-bottom: 2px solid #000; }

        .vitrine { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; max-width: 1000px; margin: auto; }
        .produto-card { display: flex; flex-direction: column; border: 1px solid #f2f2f2; padding: 10px; border-radius: 8px; text-align: center; }
        .produto-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; cursor: pointer; }
        .name { font-size: 11px; font-weight: 600; margin: 8px 0 4px; height: 32px; overflow: hidden; }
        .price { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #d63384; }
        .btn-add { background: #000; color: #fff; padding: 10px; font-size: 10px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; border-radius: 4px; }
        
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #fff; padding: 25px; border-radius: 15px; max-width: 350px; width: 100%; position: relative; text-align: center; }
        .modal-img { width: 150px; border-radius: 8px; margin-bottom: 15px; }
        .floating-cart { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; color: #fff; padding: 15px 30px; border-radius: 30px; text-decoration: none; font-weight: bold; display: none; z-index: 1500; width: 80%; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
    </style>
</head>
