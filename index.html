
<!DOCTYPE html>

 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sephora | Coleção Fran</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; }
        .top-banner { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 10px; font-weight: bold; text-transform: uppercase; }
        header { display: flex; align-items: center; justify-content: center; padding: 15px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: white; z-index: 1000; }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 5px; text-transform: uppercase; }
        .nav-categories { display: flex; overflow-x: auto; padding: 15px 10px; border-bottom: 1px solid #eee; gap: 20px; justify-content: center; }
        .nav-categories div { color: #888; font-size: 11px; font-weight: bold; text-transform: uppercase; cursor: pointer; padding-bottom: 5px; }
        .nav-categories div.active { color: #000; border-bottom: 2px solid #000; }
        .vitrine { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .produto-card { display: flex; flex-direction: column; text-decoration: none; color: inherit; }
        .produto-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; background: #f9f9f9; }
        .brand { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 8px; font-weight: bold; }
        .name { font-size: 12px; font-weight: 600; margin: 4px 0; height: 32px; overflow: hidden; }
        .price { font-size: 15px; font-weight: bold; }
        .btn-comprar { background: #d63384; color: #fff; text-align: center; padding: 12px; font-size: 11px; font-weight: bold; border-radius: 2px; margin-top: 10px; text-decoration: none; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="top-banner">✨ FRETE GRÁTIS ACIMA DE R$ 150 ✨</div>
    <header><div class="logo">SEPHORA</div></header>
    <nav class="nav-categories">
        <div onclick="aba('gloss')" id="tab-gloss" class="active">GLOSS</div>
        <div onclick="aba('perfumes')" id="tab-perfumes">PERFUMES</div>
    </nav>

    <div id="sec-gloss" class="vitrine">
        <div class="produto-card"><img src="IMG_6237.webp"><div class="brand">Fran</div><div class="name">LipChilli Original</div><div class="price">R$ 39,90</div><a href="pagamento.html" class="btn-comprar">Comprar</a></div>
        <div class="produto-card"><img src="IMG_6239.webp"><div class="brand">Fran</div><div class="name">ChocoChilli</div><div class="price">R$ 44,90</div><a href="pagamento.html" class="btn-comprar">Comprar</a></div>
        <div class="produto-card"><img src="IMG_6240.jpeg"><div class="brand">Fran</div><div class="name">PinkChilli</div><div class="price">R$ 44,90</div><a href="pagamento.html" class="btn-comprar">Comprar</a></div>
        <div class="produto-card"><img src="IMG_6241.jpeg"><div class="brand">Fran</div><div class="name">Chilli Especial</div><div class="price">R$ 49,90</div><a href="pagamento.html" class="btn-comprar">Comprar</a></div>
    </div>

    <div id="sec-perfumes" class="vitrine" style="display: none;">
        <div class="produto-card"><img src="IMG_6244.jpeg"><div class="brand">Luxury</div><div class="name">Fragrância 01</div><div class="price">R$ 670,90</div><a href="pagamento.html" class="btn-comprar">Comprar</a></div>
        <div class="produto-card"><img src="IMG_6245.jpeg"><div class="brand">Luxury</div><div class="name">Fragrância 02</div><div class="price">R$ 580,90</div><a href="pagamento.html" class="btn-comprar">Comprar</a></div>
    </div>

    <script>
        function aba(cat) {
            document.getElementById('sec-gloss').style.display = (cat === 'gloss') ? 'grid' : 'none';
            document.getElementById('sec-perfumes').style.display = (cat === 'perfumes') ? 'grid' : 'none';
            document.getElementById('tab-gloss').classList.toggle('active', cat === 'gloss');
            document.getElementById('tab-perfumes').classList.toggle('active', cat === 'perfumes');
        }
    </script>
</body>
</html>
