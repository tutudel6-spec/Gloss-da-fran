
<!DOCTYPE html>

<head>
    <meta charset="UTF-8">

    <title>Sephora | Coleção Fran</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; padding-bottom: 100px; }

        .logo { font-size: 20px; font-weight: bold; letter-spacing: 5px; }
        
        .nav { display: flex; justify-content: center; gap: 20px; padding: 15px; border-bottom: 1px solid #eee; }

        .nav div.active { color: #000; border-bottom: 2px solid #000; }

        .vitrine { display: none; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; max-width: 800px; margin: auto; }
        .vitrine.active { display: grid; }
        
        .card { border: 1px solid #eee; padding: 10px; border-radius: 8px; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }

        .card p { color: #d63384; font-weight: bold; margin-bottom: 10px; font-size: 14px; }
        .btn { background: #000; color: #fff; border: none; padding: 12px; width: 100%; font-weight: bold; border-radius: 4px; font-size: 10px; cursor: pointer; }
        
        #btn-sacola { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #000; color: #fff; padding: 15px; text-align: center; border-radius: 30px; text-decoration: none; font-weight: bold; display: none; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
    </style>
</head>
