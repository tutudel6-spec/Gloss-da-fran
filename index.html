    <style>
        body { font-family: Arial, sans-serif; margin: 0; background: #fff; }

        .brand { font-size: 10px; color: #888; text-transform: uppercase; margin-top: 8px; font-weight: bold; }
        .name { font-size: 12px; font-weight: 600; margin: 4px 0; height: 32px; overflow: hidden; line-height: 1.3; }
        .price { font-size: 15px; font-weight: 800; color: #000; }
        .btn-comprar { background: #d63384; color: #fff; text-align: center; padding: 12px 0; font-size: 11px; font-weight: bold; border-radius: 2px; margin-top: 10px; text-transform: uppercase; text-decoration: none; }
        @media (min-width: 768px) { .vitrine { grid-template-columns: 1fr 1fr 1fr 1fr; } }
    </style>
</head>
