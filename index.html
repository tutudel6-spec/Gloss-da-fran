
<!DOCTYPE html>

 <!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sephora | Carrinho</title>
    <style>
        body { font-family: sans-serif; margin: 0; background: #fff; }
        .top-banner { background: #000; color: #fff; text-align: center; padding: 8px; font-size: 10px; text-transform: uppercase; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid #eee; sticky: top; background: #fff; z-index: 1000; position: sticky; top: 0; }
        .logo { font-size: 18px; font-weight: bold; letter-spacing: 5px; }
        .cart-icon { position: relative; cursor: pointer; font-size: 22px; }
        #cart-count { position: absolute; top: -5px; right: -10px; background: #d63384; color: #fff; font-size: 10px; padding: 2px 6px; border-radius: 50%; }
        
        .nav-categories { display: flex; overflow-x: auto; padding: 15px; border-bottom: 1px solid #eee; gap: 20px; }
        .nav-categories div { color: #888; font-size: 11px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .nav-categories div.active { color: #000; border-bottom: 2px solid #000; }

        .vitrine { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .produto-card { display: flex; flex-direction: column; border: 1px solid #f0f0f0; padding: 10px; border-radius: 8px; }
        .produto-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; }
        .name { font-size: 12px; font-weight: 600; margin: 8px 0 4px; height: 32px; overflow: hidden; }
        .price { font-size: 14px; font-weight: bold; margin-bottom: 10px; }
        .btn-add { background: #000; color: #fff; text-align: center; padding: 10px; font-size: 10px; font-weight: bold; border: none; cursor: pointer; text-transform: uppercase; }
        
        .floating-cart { position: fixed; bottom: 20px; right: 20px; background: #d63384; color: #fff; padding: 15px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: none; }
    </style>
</head>
<body>

<div class="top-banner">Frete grátis em pedidos acima de R$ 150</div>

<header>
    <div style="font-size: 20px;">☰</div>
    <div class="logo">SEPHORA</div>
    <div class="cart-icon" onclick="window.location.href='pagamento.html'">🛍️ <span id="cart-count">0</span></div>
</header>

<nav class="nav-categories">
    <div onclick="aba('gloss')" id="tab-gloss" class="active">Gloss</div>
    <div onclick="aba('perfumes')" id="tab-perfumes">Perfumes</div>
</nav>

<div id="sec-gloss" class="vitrine">
    <div class="produto-card">
        <img src="IMG_6237.webp">
        <div class="name">LipChilli Original</div>
        <div class="price">R$ 39,90</div>
        <button class="btn-add" onclick="add('LipChilli Original', 39.90)">Adicionar</button>
    </div>
    <div class="produto-card">
        <img src="IMG_6239.webp">
        <div class="name">ChocoChilli</div>
        <div class="price">R$ 44.90</div>
        <button class="btn-add" onclick="add('ChocoChilli', 44.90)">Adicionar</button>
    </div>
</div>

<div id="sec-perfumes" class="vitrine" style="display: none;">
    <div class="produto-card">
        <img src="IMG_6244.jpeg">
        <div class="name">Luxury Essence</div>
        <div class="price">R$ 189,90</div>
        <button class="btn-add" onclick="add('Luxury Essence', 189.90)">Adicionar</button>
    </div>
</div>

<a href="pagamento.html" class="floating-cart" id="btn-flutuante">Ver Sacola (R$ <span id="total-flutuante">0</span>)</a>

<script>
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];

    function add(nome, preco) {
        carrinho.push({nome, preco});
        localStorage.setItem('carrinho', JSON.stringify(carrinho));
        atualizarCart();
        alert(nome + " adicionado!");
    }

    function atualizarCart() {
        document.getElementById('cart-count').innerText = carrinho.length;
        if(carrinho.length > 0) {
            document.getElementById('btn-flutuante').style.display = 'block';
            let total = carrinho.reduce((sum, item) => sum + item.preco, 0);
            document.getElementById('total-flutuante').innerText = total.toFixed(2);
        }
    }

    function aba(cat) {
        document.getElementById('sec-gloss').style.display = (cat === 'gloss') ? 'grid' : 'none';
        document.getElementById('sec-perfumes').style.display = (cat === 'perfumes') ? 'grid' : 'none';
        document.getElementById('tab-gloss').className = (cat === 'gloss') ? 'active' : '';
        document.getElementById('tab-perfumes').className = (cat === 'perfumes') ? 'active' : '';
    }

    atualizarCart();
</script>

</body>
</html>
