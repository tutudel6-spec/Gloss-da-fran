
<!DOCTYPE html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finalizar Pedido</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h3 { border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .item-carrinho { display: flex; justify-content: space-between; font-size: 14px; margin: 10px 0; border-bottom: 1px solid #f9f9f9; padding-bottom: 5px; }
        .total { font-size: 20px; font-weight: bold; text-align: right; margin-top: 20px; color: #d63384; }
        
        /* Formulário */
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-pix { background: #000; color: #fff; width: 100%; padding: 15px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 20px; }
        
        #pix-area { display: none; text-align: center; margin-top: 20px; background: #f0fdf4; padding: 20px; border-radius: 8px; border: 1px dashed #22c55e; }
        .chave { font-family: monospace; font-weight: bold; background: #fff; padding: 10px; display: block; margin: 10px 0; word-break: break-all; }
        .btn-whats { background: #25d366; color: #fff; display: block; padding: 15px; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <a href="index.html" style="text-decoration: none; color: #666; font-size: 12px;">← Continuar comprando</a>
    <h3>Sua Sacola</h3>
    <div id="lista-itens"></div>
    <div class="total">Total: R$ <span id="valor-total">0.00</span></div>

    <h3>Dados de Entrega</h3>
    <input type="text" id="nome" placeholder="Nome Completo">
    <input type="text" id="endereco" placeholder="Endereço e Número">
    <input type="text" id="cidade" placeholder="Cidade / Estado">
    <input type="text" id="cep" placeholder="CEP">

    <button class="btn-pix" onclick="mostrarPix()">Gerar Pagamento PIX</button>

    <div id="pix-area">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo%E2%80%94Pix.svg" width="60">
        <p>Copie a chave aleatória abaixo:</p>
        <span class="chave" id="chave">a11b4306-789b-4608-8e21-4a09e6de87fb</span>
        <button style="width:100%; padding:8px; cursor:pointer;" onclick="copiar()">Copiar Chave</button>
        
        <p style="font-size: 12px; color: #666; margin-top: 15px;">Pague no banco e clique abaixo para finalizar:</p>
        <a id="link-zap" href="#" class="btn-whats">Enviar Pedido no WhatsApp</a>
    </div>
</div>

<script>
    let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
    let lista = document.getElementById('lista-itens');
    let total = 0;

    carrinho.forEach(item => {
        lista.innerHTML += `<div class="item-carrinho"><span>${item.nome}</span> <b>R$ ${item.preco.toFixed(2)}</b></div>`;
        total += item.preco;
    });
    document.getElementById('valor-total').innerText = total.toFixed(2);

    function mostrarPix() {
        const nome = document.getElementById('nome').value;
        if(!nome) return alert("Por favor, preencha seus dados de entrega!");
        
        document.getElementById('pix-area').style.display = 'block';
        
        // Preparar mensagem do zap
        let itensTexto = carrinho.map(i => i.nome).join(", ");
        let endereco = document.getElementById('endereco').value;
        let cidade = document.getElementById('cidade').value;
        
        let msg = `🛍️ *NOVO PEDIDO*\n\n*Produtos:* ${itensTexto}\n*Total:* R$ ${total.toFixed(2)}\n\n*DADOS DE ENTREGA:*\n*Nome:* ${nome}\n*End:* ${endereco}\n*Cidade:* ${cidade}`;
        
        document.getElementById('link-zap').href = "https://wa.me/5571981982742?text=" + encodeURIComponent(msg);
    }

    function copiar() {
        navigator.clipboard.writeText(document.getElementById('chave').innerText);
        alert("Chave copiada!");
    }
</script>

</body>
</html>
