
<!DOCTYPE html>


<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagamento PIX</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; background: #f9f9f9; color: #333; }
        .card { background: #fff; padding: 30px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #eee; }
        .pix-logo { width: 80px; margin-bottom: 15px; }
        .item-info { margin: 15px 0; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .nome-produto { font-size: 14px; color: #666; margin-bottom: 5px; }
        .valor-total { font-size: 26px; font-weight: bold; color: #000; }
        .chave-box { background: #f0f0f0; padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; word-break: break-all; margin: 20px 0; border: 1px dashed #bbb; font-weight: bold; }
        .btn-copiar { background: #000; color: #fff; padding: 15px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-zap { background: #25d366; color: #fff; display: block; padding: 15px; margin-top: 15px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
        .aviso { font-size: 11px; color: #999; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="https://upload.wikimedia.org/wikipedia/commons/a/a2/Logo%E2%80%94Pix.svg" class="pix-logo">
        <h3>Finalizar Pagamento</h3>
        
        <div class="item-info">
            <div class="nome-produto" id="exibirNome">Produto</div>
            <div class="valor-total" id="exibirPreco">R$ 0,00</div>
        </div>

        <p style="font-size: 13px;">Copie a chave aleatória abaixo:</p>
        <div class="chave-box" id="pix">a11b4306-789b-4608-8e21-4a09e6de87fb</div>
        
        <button class="btn-copiar" onclick="copiar()">Copiar Chave PIX</button>
        
        <a href="https://wa.me/5571981982742?text=Oi! Acabei de fazer o PIX. Aqui está o comprovante!" class="btn-zap">Já paguei! Enviar comprovante</a>
        
        <div class="aviso">O envio será feito após a confirmação do pagamento.</div>
        <br>
        <a href="index.html" style="color:#999; text-decoration:none; font-size:12px;">← Voltar para a loja</a>
    </div>

    <script>
        // Função para pegar o preço e o nome do link
        const urlParams = new URLSearchParams(window.location.search);
        const preco = urlParams.get('preco');
        const nome = urlParams.get('nome');

        if (preco) document.getElementById('exibirPreco').innerText = 'R$ ' + preco;
        if (nome) document.getElementById('exibirNome').innerText = decodeURIComponent(nome);

        function copiar() {
            var text = document.getElementById("pix").innerText;
            navigator.clipboard.writeText(text);
            alert("Chave PIX copiada com sucesso!");
        }
    </script>
</body>
</html>
